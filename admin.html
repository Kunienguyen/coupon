<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupon Admin V2</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#050505;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    background:#111827;
    border-radius:20px;
    padding:25px;
    box-shadow:
    0 10px 30px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

h2{
    margin-bottom:10px;
    text-align:center;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#1f2937;
    color:white;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

.green{
    background:#22c55e;
    color:white;
}

.red{
    background:#ef4444;
    color:white;
}

.gray{
    background:#374151;
    color:white;
}

.hidden{
    display:none;
}

.info{
    text-align:center;
    margin-bottom:15px;
    color:#d1d5db;
}

</style>

</head>

<body>

<div class="card" id="loginBox">

```
<h1>🔒 Admin Login</h1>

<input
    type="password"
    id="password"
    placeholder="Nhập mật khẩu">

<button
    class="green"
    onclick="login()">

    Đăng nhập

</button>
```

</div>

<div
class="card hidden"
id="adminPanel">

```
<h1>🎁 Coupon Admin</h1>

<div
class="info"
id="spinCount">

Bonus Spins: 0

</div>

<button
class="green"
onclick="addSpin(1)">

+1 Spin

</button>

<button
class="green"
onclick="addSpin(5)">

+5 Spins

</button>

<button
class="red"
onclick="resetCooldown()">

Reset Cooldown

</button>

<button
class="red"
onclick="clearAll()">

Xóa toàn bộ dữ liệu

</button>

<button
class="gray"
onclick="logout()">

Đăng xuất

</button>
```

</div>

<script>

const PASSWORD =
"Kunie2k12@";

function loadData(){

    return JSON.parse(
        localStorage.getItem(
            "couponData"
        )
    ) || {

        coupons: [],
        bonusSpins: 0,
        lastSpin: 0

    };

}

function saveData(data){

    localStorage.setItem(
        "couponData",
        JSON.stringify(data)
    );

}

function updateView(){

    const data =
        loadData();

    document
        .getElementById(
            "spinCount"
        )
        .textContent =

        "🎁 Bonus Spins: "
        + data.bonusSpins +

        " | Coupons: "
        + data.coupons.length;

}

function login(){

    const pass =
        document
        .getElementById(
            "password"
        )
        .value;

    if(
        pass !== PASSWORD
    ){

        alert(
            "Sai mật khẩu"
        );

        return;

    }

    document
        .getElementById(
            "loginBox"
        )
        .classList
        .add("hidden");

    document
        .getElementById(
            "adminPanel"
        )
        .classList
        .remove("hidden");

    updateView();

}

function addSpin(amount){

    const data =
        loadData();

    data.bonusSpins += amount;

    saveData(data);

    updateView();

    alert(
        "Đã cộng "
        + amount
        + " spin"
    );

}

function resetCooldown(){

    const data =
        loadData();

    data.lastSpin = 0;

    saveData(data);

    alert(
        "Đã reset cooldown"
    );

}

function clearAll(){

    const ok =
        confirm(
            "Xóa toàn bộ dữ liệu?"
        );

    if(!ok) return;

    localStorage.removeItem(
        "couponData"
    );

    alert(
        "Đã xóa dữ liệu"
    );

    location.reload();

}

function logout(){

    location.reload();

}

</script>

</body>
</html>
